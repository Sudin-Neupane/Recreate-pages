<!DOCTYPE html>
<html> 
    <head> 
        <title>instagram login page</title>
        <link rel="stylesheet" href="instastyle.css">
    </head>
    <body>  
          <div class="left-panel">

    
    <div class="logo">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ig-grad" x1="0" y1="60" x2="60" y2="0" gradientUnits="userSpaceOnUse">
            <stop stop-color="#f09433"/>
            <stop offset="0.25" stop-color="#e6683c"/>
            <stop offset="0.5" stop-color="#dc2743"/>
            <stop offset="0.75" stop-color="#cc2366"/>
            <stop offset="1" stop-color="#bc1888"/>
          </linearGradient>
        </defs>
        <rect width="60" height="60" rx="14" fill="url(#ig-grad)"/>
        <rect x="8" y="8" width="44" height="44" rx="10" stroke="white" stroke-width="3" fill="none"/>
        <circle cx="30" cy="30" r="10" stroke="white" stroke-width="3" fill="none"/>
        <circle cx="43" cy="17" r="3" fill="white"/>
      </svg>
    </div>

  <h1 class="tagline">
    See Everyday moments from your <br> 
    <span class="highlight"> close friends.</span>
  </h1>   
<div class="collage">
    <div class="card">
        <img src="pic1.JPG" alt="Story 1" onerror="this.style.background='#2a2a2a';this.removeAttribute('src')"/>
    </div>
     <div class="card">
        <img src="pic2.png" alt="Story 2" onerror="this.style.background='#333';this.removeAttribute('src')"/>
    </div>
     <div class="card">
        <img src="pic3.PNG" alt="Story 3" onerror="this.style.background='#222';this.removeAttribute('src')"/>
    </div>
    <div class="sticker-heart">💖</div>
    <div class="sticker-badge">⭐</div>
</div>
</div>
<div class="right-pannel">
    <h2> Log into your instagram</h2>
    <div class="form-group">
<input type="text" placeholder="Mobile Number, Username or email"/>


    </div>
    <div class="form-group">
<input type="password" placeholder="password" />


    </div>

    <button class="btn-login"> Log in </button>
<a href="#" class="forget"> Forget Password? </a>
<div class="divider"></div>
<button class="btn-facebook">
    <div class="fb-icon">f</div>
    Log in with facebook
</button>
<button class="btn-create"> Create new Account</button>
<div class="meta-logo">
    <span class="infinity">♾️</span> Meta 
</div>


</div>

    </body>
</html>
