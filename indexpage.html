
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Login</title>
  <style>
     @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Playfair+Display:ital@1&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
    }

    .scene {
      display: flex;
      min-height: 100vh;
      position: relative;
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .art-panel {
      flex: 1.1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 60px 50px;
      overflow: hidden;
      background: #0d0d0d;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }

    .orb1 {
      width: 420px;
      height: 420px;
      top: -80px;
      left: -100px;
      background: radial-gradient(circle, rgba(230, 60, 100, 0.3) 0%, transparent 70%);
    }

    .orb2 {
      width: 350px;
      height: 350px;
      bottom: 100px;
      left: 80px;
      background: radial-gradient(circle, rgba(255, 140, 0, 0.2) 0%, transparent 70%);
    }

    .orb3 {
      width: 300px;
      height: 300px;
      top: 200px;
      right: -60px;
      background: radial-gradient(circle, rgba(100, 60, 255, 0.25) 0%, transparent 70%);
    }

    .word-cloud {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .wc-word {
      position: absolute;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: rgba(255, 255, 255, 0.06);
      font-size: 4rem;
      user-select: none;
      white-space: nowrap;
    }

    .wc-word:nth-child(1) {
      top: 8%;
      left: 5%;
      font-size: 5rem;
    }

    .wc-word:nth-child(2) {
      top: 30%;
      left: 20%;
      font-size: 2.5rem;
      color: rgba(255, 255, 255, 0.04);
    }

    .wc-word:nth-child(3) {
      top: 55%;
      left: 3%;
      font-size: 6rem;
      color: rgba(255, 255, 255, 0.03);
    }

    .wc-word:nth-child(4) {
      top: 72%;
      left: 30%;
      font-size: 3rem;
    }

    .polaroids {
      position: relative;
      width: 100%;
      height: 320px;
      margin-bottom: 40px;
    }

    .pol {
      position: absolute;
      background: #1a1a1a;
      padding: 12px 12px 36px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      cursor: default;
      transition: transform 0.4s ease;
    }

    .pol:hover {
      transform: translateY(-8px) rotate(0deg) !important;
      z-index: 10 !important;
    }

    .pol .img-slot {
      width: 160px;
      height: 160px;
      background: #2a2a2a;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pol .img-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .pol .caption {
      text-align: center;
      margin-top: 8px;
      font-size: 11px;
      color: #555;
      letter-spacing: 0.05em;
      font-family: 'Space Grotesk', sans-serif;
    }

    .pol1 {
      left: 20px;
      top: 30px;
      transform: rotate(-8deg);
      z-index: 1;
    }

    .pol2 {
      left: 110px;
      top: 10px;
      transform: rotate(3deg);
      z-index: 2;
    }

    .pol3 {
      left: 210px;
      top: 50px;
      transform: rotate(-3deg);
      z-index: 3;
    }

    .pol4 {
      left: 300px;
      top: 20px;
      transform: rotate(7deg);
      z-index: 2;
    }

    .art-copy {
      position: relative;
      z-index: 2;
    }

    .art-eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 14px;
    }

    .art-headline {
      font-size: 2.6rem;
      font-weight: 300;
      color: #fff;
      line-height: 1.15;
      max-width: 420px;
    }

    .art-headline em {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      background: linear-gradient(135deg, #f5832a, #e8205a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-panel {
      width: 420px;
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 70px 50px;
      position: relative;
      z-index: 2;
    }
    
    .login-panel::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10%;
      bottom: 10%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.08) 30%, rgba(255, 255, 255, 0.08) 70%, transparent);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 50px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 1.3rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .form-eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 22px;
    }

    .form-title {
      font-size: 1.6rem;
      font-weight: 400;
      color: #fff;
      margin-bottom: 40px;
      line-height: 1.2;
    }

    .form-title span {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: #e8205a;
    }

    .field {
      margin-bottom: 16px;
      position: relative;
    }

    .field input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #2a2a2a;
      color: #fff;
      font-size: 0.95rem;
      font-family: 'Space Grotesk', sans-serif;
      padding: 14px 0;
      outline: none;
      transition: border-color 0.3s;
      letter-spacing: 0.01em;
    }

    .field input::placeholder {
      color: #3a3a3a;
      font-size: 0.9rem;
    }

    .field input:focus {
      border-bottom-color: #e8205a;
    }

    .field label {
      position: absolute;
      top: 14px;
      left: 0;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #333;
      transition: 0.3s;
      pointer-events: none;
    }

    .field input:focus ~ label,
    .field input:not(:placeholder-shown) ~ label {
      top: -8px;
      font-size: 0.68rem;
      color: #e8205a;
    }

    .btn-main {
      width: 100%;
      margin-top: 36px;
      padding: 16px;
      background: linear-gradient(135deg, #f5832a, #e8205a);
      border: none;
      border-radius: 3px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-main:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn-main:active {
      transform: translateY(0);
    }

    .links-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 22px;
    }

    .links-row a {
      font-size: 0.8rem;
      color: #444;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.2s;
      cursor: pointer;
    }

    .links-row a:hover {
      color: #aaa;
    }

    .or-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 36px 0 28px;
    }

    .or-line {
      flex: 1;
      height: 1px;
      background: #1e1e1e;
    }

    .or-text {
      font-size: 0.75rem;
      color: #333;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .btn-fb {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1px solid #1e1e1e;
      border-radius: 3px;
      color: #555;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-fb:hover {
      border-color: #333;
      color: #888;
    }
    
    .fb-dot {
      width: 18px;
      height: 18px;
      background: #1877f2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .footer-row {
      margin-top: 50px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-row span {
      font-size: 0.75rem;
      color: #2a2a2a;
      letter-spacing: 0.03em;
    }

    .footer-row a {
      font-size: 0.75rem;
      color: #3a3a3a;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .footer-row a:hover {
      color: #888;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.3;
      }
      50% {
        opacity: 1;
      }
    }

    .live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #2fcc6e;
      animation: pulse 2.5s ease infinite;
      flex-shrink: 0;
    }
    </style>
</head>
<body>
  <div class="scene">
    <div class="grain"></div>

    <div class="art-panel">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>

      <div class="word-cloud">
        <div class="wc-word">memories</div>
        <div class="wc-word">candid</div>
        <div class="wc-word">real</div>
        <div class="wc-word">yours</div>
      </div>

      <div class="polaroids">
        <div class="pol pol1">
          <div class="img-slot">
            <img src="picc1.png" alt="" onerror="this.parentNode.style.background='#1e1518'" />
          </div>
          <div class="caption">sunday</div>
        </div>
        <div class="pol pol2">
          <div class="img-slot">
            <img src="picc2.jpg" alt="" onerror="this.parentNode.style.background='#121820'" />
          </div>
          <div class="caption">golden hour</div>
        </div>
        <div class="pol pol3">
          <div class="img-slot">
            <img src="picc3.jpeg" alt="" onerror="this.parentNode.style.background='#181818'" />
          </div>
          <div class="caption">close ones</div>
        </div>
        <div class="pol pol4">
          <div class="img-slot">
            <img src="picc4.jpeg" alt="" onerror="this.parentNode.style.background='#1a1a12'" />
          </div>
          <div class="caption">today</div>
        </div>
      </div>

      <div class="art-copy">
        <div class="art-eyebrow">Your world, unfiltered</div>
        <div class="art-headline">Life happens in<br><em>close proximity.</em></div>
      </div>
    </div>

    <div class="login-panel">
      <div class="logo-row">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0" y1="32" x2="32" y2="0">
              <stop stop-color="#f09433" />
              <stop offset="0.3" stop-color="#dc2743" />
              <stop offset="0.7" stop-color="#cc2366" />
              <stop offset="1" stop-color="#bc1888" />
            </linearGradient>
          </defs>
          <rect width="32" height="32" rx="8" fill="url(#g1)" />
          <rect x="5" y="5" width="22" height="22" rx="5" stroke="white" stroke-width="1.5" fill="none" />
          <circle cx="16" cy="16" r="5" stroke="white" stroke-width="1.5" fill="none" />
          <circle cx="23" cy="9" r="1.5" fill="white" />
        </svg>
        <span class="brand-name">Instagram</span>
      </div>

      <div class="form-eyebrow">Welcome back</div>
      <div class="form-title">Sign in to<br>your <span>moment</span></div>

      <div class="field">
        <input type="text" id="usr" placeholder=" " />
        <label for="usr">Username or email</label>
      </div>
      <div class="field">
        <input type="password" id="pwd" placeholder=" " />
        <label for="pwd">Password</label>
      </div>

      <button class="btn-main">Continue &rarr;</button>

      <div class="links-row">
        <a>Forgot password?</a>
        <div style="display:flex;align-items:center;gap:5px">
          <div class="live-dot"></div>
          <span style="font-size:0.75rem;color:#2a2a2a">Secure login</span>
        </div>
      </div>

      <div class="or-row">
        <div class="or-line"></div>
        <span class="or-text">or</span>
        <div class="or-line"></div>
      </div>

      <button class="btn-fb">
        <div class="fb-dot">f</div>
        Continue with Facebook
      </button>

      <div class="footer-row">
        <span>New here?</span>
        <a>Create an account</a>
        <span style="margin-left:auto;display:flex;align-items:center;gap:4px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="#2a2a2a" />
          </svg>
          <span style="font-size:0.7rem;color:#2a2a2a">Meta</span>
        </span>
      </div>
    </div>
  </div>
</body>
</html>
